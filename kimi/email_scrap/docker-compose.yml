version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: crwm_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-crwm_db}
      POSTGRES_USER: ${DB_USER:-crwm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crwm_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: crwm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data



  app:
    build: .
    container_name: crwm_app
    restart: unless-stopped
    depends_on:
      - db
      - redis
    ports:
      - "8067:8067"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-crwm_db}
      - DB_USER=${DB_USER:-crwm_user}
      - DB_PASSWORD=${DB_PASSWORD:-crwm_password}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
    # env_file:             # Uncomment if you want to use a .env file
    #   - .env

  workers:
    build: .
    container_name: crwm_workers
    restart: unless-stopped
    depends_on:
      - db
      - redis
    command: ["python", "-m", "system.start_workers"]
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-crwm_db}
      - DB_USER=${DB_USER:-crwm_user}
      - DB_PASSWORD=${DB_PASSWORD:-crwm_password}
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - BROWSER_TIMEOUT=60000
    # env_file:
    #   - .env

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: crwm_nginx
    restart: unless-stopped
    expose:
      - "80"
    depends_on:

      - app


volumes:
  postgres_data:
  redis_data:
